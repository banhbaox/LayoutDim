name: Build LayoutDim CDE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MFC libraries
        run: |
          $installer = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\setup.exe"
          $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          & $installer modify --installPath $vsPath --add Microsoft.VisualStudio.Component.VC.ATLMFC --quiet --norestart
        shell: powershell

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Run CDEGen (generate function registration)
        run: |
          $cdegen = "C:\Program Files\Kubotek\KeyCreatorD23.0\SDK\CDEGen.exe"
          if (Test-Path $cdegen) {
            & $cdegen Funcs.cdf
          } else {
            Write-Output "CDEGen not found on runner - using pre-generated Funcs.cpp"
          }
        shell: powershell

      - name: Build CDE
        run: |
          msbuild LayoutDim.vcxproj /p:Configuration=Release /p:Platform=x64 /v:minimal

      - name: Upload CDE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LayoutDim-CDE
          path: Output\LayoutDim.cde
